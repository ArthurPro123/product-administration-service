version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app
      - ${SECRETS_DIR_PATH}:/run/secrets:ro
      - ./.env:/app/.env
    environment:
      - FLASK_APP=app:create_app
      - FLASK_ENV=development
      - FLASK_RUN_PORT=5000
      - DISABLE_HTTPS=true
    command: flask run --debug --host=0.0.0.0
    # No network configuration needed

  bdd-tests:
    image: mcr.microsoft.com/playwright/python:v1.40.0-focal
    network_mode: host
    working_dir: /app
    volumes:
      - ./features:/app/features
      - ./app:/app/app
    environment:
      - BASE_URL=http://localhost:5000  # Use localhost, not 'app'
    command: sh -c "sleep 5 && pip install behave requests playwright && playwright install chromium && behave features/ -D browser=chromium -D ui=false"
