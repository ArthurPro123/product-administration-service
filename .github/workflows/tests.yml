name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create secrets directory
      run: |
        mkdir -p ./secrets
        touch ./secrets/cert.pem
        touch ./secrets/key.pem

    - name: Create .env file
      run: |
        echo "ENV=development" >> .env
        echo "SECRETS_DIR_PATH=./secrets" >> .env

    - name: Start app container (for both test suites)
      run: |
        docker compose up -d --build app
        sleep 10

    - name: Run pytest (in your test container)
      run: |
        docker compose up -d test
        docker compose exec -T test pytest tests/ -v --spec --no-cov

    - name: Run BDD tests (in official Playwright container)
      run: |
        docker run --rm \
          --network host \
          -v $(pwd)/features:/app/features \
          -v $(pwd)/app:/app/app \
          -w /app \
          mcr.microsoft.com/playwright/python:v1.40.0-focal \
          python -c "import subprocess, sys; subprocess.run([sys.executable, '-m', 'pip', 'install', 'behave', 'requests']); subprocess.run(['behave', 'features/', '-D', 'browser=chromium', '-D', 'ui=false'])"

    - name: Shutdown
      if: always()
      run: |
        docker compose down
