name: CI with Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create secrets directory for CI
      run: |
        mkdir -p ./secrets
        touch ./secrets/cert.pem
        touch ./secrets/key.pem

    - name: Create .env file for CI
      run: |
        echo "ENV=development" >> .env
        echo "SECRETS_DIR_PATH=./secrets" >> .env

    - name: Build and start containers
      run: |
        docker compose up -d --build app test
        sleep 10

    - name: Install Playwright browsers in container
      run: |
        docker compose exec -T -u root test apt-get update
        docker compose exec -T -u root test apt-get install -y wget gnupg
        docker compose exec -T -u root test pip install playwright
        docker compose exec -T -u root test playwright install chromium
        docker compose exec -T -u root test playwright install-deps chromium

    - name: Run pytest (without coverage)
      run: |
        docker compose exec -T test pytest tests/ -v --spec --no-cov

    - name: Run BDD tests
      run: |
        docker compose exec -T test behave features/ -D browser=chromium -D ui=false

    - name: Shutdown containers
      if: always()
      run: |
        docker compose down
