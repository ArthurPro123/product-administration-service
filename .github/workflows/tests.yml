name: CI with Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python for behave
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install all dependencies
      run: |
        pip install -r requirements.txt
        python -m playwright install chromium
        python -m playwright install-deps chromium

    - name: Create .env file
      run: |
        echo "ENV=development" >> .env
        echo "JWT_SECRET_KEY=test-secret-key" >> .env

    - name: Start Flask app for BDD tests
      run: |
        export FLASK_APP=app/app.py
        export ENV=development
        export DATABASE_URI=sqlite:///:memory:
        export JWT_SECRET_KEY=test-secret-key
        flask run --host=0.0.0.0 --port=5000 &
        sleep 10
        curl -f http://localhost:5000/ || (echo "App failed to start" && exit 1)

    - name: Run BDD tests
      env:
        BASE_URL: http://localhost:5000
      run: |
        behave features/ -D browser=chromium -D ui=false

    - name: Shutdown
      if: always()
      run: |
        pkill -f flask || true
