name: CI with Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install playwright
        playwright install chromium

    - name: Create .env file
      run: |
        echo "ENV=development" >> .env
        echo "JWT_SECRET_KEY=test-secret-key" >> .env

    - name: Start Flask app
      run: |
        export FLASK_APP=app/app.py
        export ENV=development
        export DATABASE_URI=sqlite:///:memory:
        flask run --host=0.0.0.0 --port=5000 &
        sleep 10
        curl -f http://localhost:5000/ || exit 1

    - name: Run BDD tests
      env:
        BASE_URL: http://localhost:5000
      run: |
        behave features/ -D browser=chromium -D ui=false

    - name: Run pytest with Docker
      run: |
        docker compose up -d --build app test
        sleep 10
        docker compose exec -T test pytest tests/ -v --spec --no-cov
        docker compose down
