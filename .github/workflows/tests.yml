name: CI with Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and start containers
      run: |
        docker-compose up -d --build app
        sleep 10  # Wait for app to be ready

    - name: Run pytest
      run: |
        docker-compose exec -T test pytest tests/ -v --spec

    - name: Run BDD tests
      run: |
        docker-compose exec -T test behave features/ -D browser=chromium -D ui=false

    - name: Shutdown
      if: always()
      run: |
        docker-compose down
