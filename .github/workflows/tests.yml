name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4


    # --- Preparation: --- #

    - name: Create secrets directory
      run: |
        mkdir -p ./secrets
        touch ./secrets/cert.pem
        touch ./secrets/key.pem

    - name: Create .env file
      run: |
        echo "ENV=development" >> .env
        echo "SECRETS_DIR_PATH=./secrets" >> .env


    # --- 1. Run the app for testing with pytest --- #

    - name: Run pytest (in the test container)
      run: |
        docker compose up -d test
        docker compose exec -T test pytest tests/ -v --spec --no-cov


    # --- 2. Run another instance of the app for BDD tests --- #

    # - name: Start app for BDD tests
    #   run: |
    #     docker compose up -d app
    #     echo "Waiting for app to be ready..."
    #     sleep 10

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install behave requests playwright
        playwright install chromium

    - name: Run BDD tests
      run: |
        # Start Flask app in background
        export FLASK_APP=app:create_app
        export FLASK_ENV=development
        export DISABLE_HTTPS=true
        flask run --host=0.0.0.0 --port=5000 &

    # --- 3. Run behave in its own container --- #

        # Wait for app to be ready
        sleep 10
        
        # Run behave tests
        behave features/ -D browser=chromium -D ui=false
        
        # Kill Flask app
        kill %1


    # --- Clean up --- #

    - name: Shutdown
      if: always()
      run: |
        docker compose down
