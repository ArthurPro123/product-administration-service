name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install behave playwright requests flask flask-sqlalchemy
        playwright install chromium

    - name: Start Flask app
      run: |
        export FLASK_APP=app/app.py
        export ENV=development
        export DATABASE_URI=sqlite:///:memory:
        flask run --host=0.0.0.0 --port=5000 &
        sleep 10

    - name: Run BDD tests
      run: |
        behave features/ -D browser=chromium -D ui=false

    - name: Run pytest with Docker
      run: |
        docker compose up -d --build app test
        sleep 10
        docker compose exec -T test pytest tests/ -v --spec --no-cov
        docker compose down
