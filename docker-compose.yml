#     volumes:
#       # - .:/app
#       - ./app:/app  # Mount only the app directory

#       - ${SECRETS_DIR_PATH}:/run/secrets:ro   # read‑only mount
#           # SECRETS_DIR_PATH is set in the .env file.

#       - ./.env:/app/.env  # Mount the .env file too 

#     environment:
